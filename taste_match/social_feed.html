<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Social Feed</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="background">

    <header class="top_nav">
      <div class="topnav__inner">
        <div class="logo">
          <a href="home.html">
            <img src="lmm_logo.png" alt="TasteMatch Logo" width="50" height="50">
          </a>
        </div>

        <nav class="topnav">
          <a href="home.html">Home</a>
          <a href="addLocation.html">Add Location</a>
          <a href="matchmaker.html">MatchMaker</a>
          <a href="social_feed.html" class="active">Photo Album</a>
        </nav>
      </div>
    </header>

    <main class="feed-shell">
      <section class="feed-header">
        <div>
          <h1>Food Social Feed</h1>
          <p>Share food photos, captions, and restaurant moments.</p>
        </div>

        <input class="search" type="text" placeholder="Search...">

        <div class="nav">
          <a href="#create-post" class="post-btn">+ Post</a>
          <div>Profile</div>
        </div>
      </section>

      <div id="create-post" class="modal">
        <div class="modal-content">
          <a href="#" class="close">✕</a>
          <h2>Create a New Post</h2>

          <form id="postForm" enctype="multipart/form-data">
            <label>Restaurant Name</label>
            <input type="text" name="restaurant_name" placeholder="Enter restaurant name" required>

            <label>Caption</label>
            <textarea name="caption" placeholder="Write a short caption..." required></textarea>

            <label>Upload Image</label>
            <input type="file" name="image" accept="image/*" required>

            <button type="submit">Share Post</button>
          </form>
        </div>
      </div>

      <section class="feed" id="feed"></section>

      <footer>
        Loading more...
      </footer>
    </main>

  </div>

  <script src="/script.js"></script>
</body>
</html>
