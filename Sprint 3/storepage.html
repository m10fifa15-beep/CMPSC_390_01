<!DOCTYPE html>
<html>
<head>
  <title>Restaurant</title>
  <link rel="stylesheet" href="storepage.css">
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">
  <div class="topnav__inner">
    <h2 class="logo" id="storeLogo">Restaurant</h2>

    <div class="auth-inline">
      <input id="authUsername" placeholder="Username">
      <input id="authPassword" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="register()">Register</button>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="store-hero">
  <h1 id="storeName">Restaurant</h1>
  <p class="subtitle" id="storeSubtitle">Loading restaurant details...</p>
  <h2 id="avgRating">⭐ 0.0</h2>
  <p id="currentUser"></p>
</div>

<!-- REVIEW SECTION -->
<div class="review-box">
  <h3>Leave a Review</h3>

  <div class="stars" id="starContainer">
    <span data-value="1">★</span>
    <span data-value="2">★</span>
    <span data-value="3">★</span>
    <span data-value="4">★</span>
    <span data-value="5">★</span>
  </div>

  <textarea id="reviewText" placeholder="Write your review..."></textarea>

  <button onclick="submitReview()">Submit Review</button>

  <select id="sortSelect" onchange="loadReviews()">
    <option value="newest">Newest</option>
    <option value="highest">Highest Rated</option>
  </select>
</div>

<!-- REVIEWS -->
<h2 class="section-title">Customer Reviews</h2>
<div id="reviews" class="cardgrid"></div>

<script>
const params = new URLSearchParams(window.location.search);
const locationId = params.get("locationId");
let selectedRating = 0;
let currentUser = null;

// Load user from localStorage on page load
window.addEventListener('load', () => {
  const storedUser = localStorage.getItem('currentUser');
  if (storedUser) {
    currentUser = JSON.parse(storedUser);
    document.getElementById("currentUser").innerText = "Logged in as: " + currentUser.username;
  }
});

// STARS
document.querySelectorAll("#starContainer span").forEach(star => {
  star.addEventListener("click", () => {
    selectedRating = Number(star.dataset.value);

    document.querySelectorAll("#starContainer span").forEach(s => {
      s.classList.remove("active");
    });

    for (let i = 0; i < selectedRating; i++) {
      document.querySelectorAll("#starContainer span")[i].classList.add("active");
    }
  });
});

//load restaurant
function loadRestaurant() {
  if (!locationId) {
    document.getElementById("storeName").innerText = "Restaurant not found";
    document.getElementById("storeSubtitle").innerText = "No restaurant selected.";
    document.getElementById("storeLogo").innerText = "Restaurant";
    return;
  }

  fetch(`http://localhost:3000/location/${locationId}`)
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        document.getElementById("storeName").innerText = "Restaurant not found";
        document.getElementById("storeSubtitle").innerText = data.error;
        document.getElementById("storeLogo").innerText = "Restaurant";
        return;
      }

      document.getElementById("storeName").innerText = data.name;
      document.getElementById("storeSubtitle").innerText =
        `${data.category || "Restaurant"} • ${data.city || ""}${data.state ? ", " + data.state : ""}`;
      document.getElementById("storeLogo").innerText = data.name;
    })
    .catch(() => {
      document.getElementById("storeName").innerText = "Restaurant not found";
      document.getElementById("storeSubtitle").innerText = "Could not load restaurant details.";
      document.getElementById("storeLogo").innerText = "Restaurant";
    });
}

// AUTH
function register() {
  fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: authUsername.value,
      password: authPassword.value
    })
  }).then(() => alert("Registered!"));
}

function login() {
  fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: authUsername.value,
      password: authPassword.value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) return alert("Login failed");

    currentUser = data;
    localStorage.setItem('currentUser', JSON.stringify(data));
    document.getElementById("currentUser").innerText =
      "Logged in as: " + data.username;
  });
}

// REVIEW
function submitReview() {
  if (!currentUser) return alert("Login first");
  if (!locationId) return alert("No restaurant selected");
  if (!selectedRating) return alert("Please select a rating");

  fetch("http://localhost:3000/reviews", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId: currentUser.userId,
      locationId: Number(locationId),
      rating: selectedRating,
      review: reviewText.value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) return alert(data.error);

    reviewText.value = "";
    loadReviews();
    loadAverage();
  });
}

// LOAD REVIEWS
function loadReviews() {
  if (!locationId) return;

  fetch(`http://localhost:3000/reviews?locationId=${locationId}&sort=${sortSelect.value}`)
    .then(res => res.json())
    .then(data => {
      reviews.innerHTML = "";

      data.forEach(r => {
        const div = document.createElement("div");
        div.classList.add("card");

        const isOwner = currentUser && Number(currentUser.userId) === Number(r.user_id);

        div.innerHTML = `
          <div class="review-header">
            <strong>${r.username}</strong>
            <span class="stars-display">${"★".repeat(r.rating)}</span>
          </div>
          <p>${r.review}</p>
          ${isOwner ? `<button class="delete-btn" onclick="deleteReview(${r.id})">Delete</button>` : ""}
        `;

        reviews.appendChild(div);
      });

      if (data.length === 0) {
        reviews.innerHTML = `<p>No reviews yet for this restaurant.</p>`;
      }
    });
}

// DELETE
function deleteReview(id) {
  fetch(`http://localhost:3000/reviews/${id}`, {
    method: "DELETE",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      userId: currentUser.userId
    })
  }).then(() => {
    loadReviews();
    loadAverage();
  });
}

// AVG
function loadAverage() {
  if (!locationId) return;

  fetch(`http://localhost:3000/reviews/average?locationId=${locationId}`)
    .then(res => res.json())
    .then(data => {
      avgRating.innerText = "⭐ " + Number(data.average || 0).toFixed(1);
    });
}

loadReviews();
loadAverage();
loadRestaurant();
</script>

</body>
</html>
