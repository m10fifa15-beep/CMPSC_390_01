<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store Page</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .stars span {
      font-size: 25px;
      cursor: pointer;
      color: gray;
    }

    .stars span.active {
      color: gold;
    }

    .review {
      border-bottom: 1px solid #ccc;
      padding: 10px 0;
    }
  </style>
</head>
<body>

<h1>Product Name</h1>

<h2>Leave a Review</h2>

<div class="stars" id="starContainer">
  <span data-value="1">★</span>
  <span data-value="2">★</span>
  <span data-value="3">★</span>
  <span data-value="4">★</span>
  <span data-value="5">★</span>
</div>

<textarea id="reviewText" placeholder="Write your review..."></textarea><br><br>
<button onclick="submitReview()">Submit</button>

<h2>Reviews</h2>
<div id="reviews"></div>

<script>
let selectedRating = 0;

// Star selection
document.querySelectorAll("#starContainer span").forEach(star => {
  star.addEventListener("click", () => {
    selectedRating = star.dataset.value;

    document.querySelectorAll("#starContainer span").forEach(s => {
      s.classList.remove("active");
    });

    for (let i = 0; i < selectedRating; i++) {
      document.querySelectorAll("#starContainer span")[i].classList.add("active");
    }
  });
});

// Submit review
function submitReview() {
  const text = document.getElementById("reviewText").value;

  fetch("http://localhost:3000/reviews", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      rating: selectedRating,
      review: text
    })
  })
  .then(res => res.json())
  .then(() => {
    loadReviews();
  });
}

// Load reviews
function loadReviews() {
  fetch("http://localhost:3000/reviews")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("reviews");
      container.innerHTML = "";

      data.forEach(r => {
        const div = document.createElement("div");
        div.classList.add("review");

        div.innerHTML = `
          <strong>${"★".repeat(r.rating)}</strong>
          <p>${r.review}</p>
        `;

        container.appendChild(div);
      });
    });
}

loadReviews();
</script>

</body>
</html>
