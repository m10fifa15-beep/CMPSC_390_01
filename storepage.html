<!DOCTYPE html>
<html>
<head>
  <title>Store</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; }
    .stars span { font-size: 25px; cursor: pointer; color: gray; }
    .active { color: gold; }
  </style>
</head>
<body>

<h1>Store Page</h1>

<h2 id="avgRating">Average: 0</h2>

<!-- AUTH -->
<h3>Register</h3>
<input id="regUser" placeholder="username">
<input id="regPass" type="password" placeholder="password">
<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="logUser" placeholder="username">
<input id="logPass" type="password" placeholder="password">
<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<hr>

<!-- REVIEW -->
<h2>Leave Review</h2>

<div class="stars" id="stars">
  <span data-v="1">★</span>
  <span data-v="2">★</span>
  <span data-v="3">★</span>
  <span data-v="4">★</span>
  <span data-v="5">★</span>
</div>

<textarea id="review"></textarea><br>
<button onclick="submitReview()">Submit</button>

<h2>Reviews</h2>
<div id="reviews"></div>

<script>
let rating = 0;

document.querySelectorAll("#stars span").forEach(star => {
  star.onclick = () => {
    rating = star.dataset.v;

    document.querySelectorAll("#stars span").forEach(s => s.classList.remove("active"));
    for (let i = 0; i < rating; i++) {
      document.querySelectorAll("#stars span")[i].classList.add("active");
    }
  };
});

// AUTH
function register() {
  fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  });
}

function login() {
  fetch("http://localhost:3000/login", {
    method: "POST",
    credentials: "include",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: logUser.value,
      password: logPass.value
    })
  });
}

function logout() {
  fetch("http://localhost:3000/logout", {
    credentials: "include"
  });
}

// REVIEWS
function submitReview() {
  fetch("http://localhost:3000/reviews", {
    method: "POST",
    credentials: "include",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      rating,
      review: review.value
    })
  }).then(loadReviews);
}

function loadReviews() {
  fetch("http://localhost:3000/reviews")
    .then(res => res.json())
    .then(data => {
      avgRating.innerText = "Average: " + Number(data.average).toFixed(1);

      reviews.innerHTML = "";

      data.reviews.forEach(r => {
        reviews.innerHTML += `
          <div>
            <strong>${r.username}</strong>
            <div>${"★".repeat(r.rating)}</div>
            <p>${r.review}</p>
          </div>
        `;
      });
    });
}

loadReviews();
</script>

</body>
</html>
