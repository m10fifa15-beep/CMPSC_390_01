<!DOCTYPE html>

    <!-- RESTAURANT CONTENT -->
    <main class="store">
      <section class="store__header">
        <h1 id="name">Restaurant Name</h1>
        <p id="category">Cuisine Type</p>
      </section>

      <section class="store__info">
        <div class="store__image">
          <img id="image" src="" alt="Restaurant Image">
        </div>

        <div class="store__details">
          <p id="description">Description here...</p>
          <p><strong>Location:</strong> <span id="location"></span></p>
          <p><strong>Rating:</strong> <span id="rating"></span></p>
        </div>
      </section>

      <section class="store__reviews">
        <h2>User Reviews</h2>
        <div id="reviews"></div>
      </section>
    </main>

  </div>

<script>
// Fetch restaurant data dynamically
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch(`http://localhost:3000/restaurant/${id}`)
  .then(res => res.json())
  .then(data => {
    document.getElementById("name").textContent = data.name;
    document.getElementById("category").textContent = data.category;
    document.getElementById("description").textContent = data.description;
    document.getElementById("location").textContent = data.location;
    document.getElementById("rating").textContent = data.rating;
    document.getElementById("image").src = data.image;

    const reviewsDiv = document.getElementById("reviews");
    data.reviews.forEach(r => {
      const p = document.createElement("p");
      p.textContent = r.comment;
      reviewsDiv.appendChild(p);
    });
  });
</script>

</body>
</html>
